<header class="p-3 w-full fixed top-0 z-50 bg-gradient-to-r from-red-700 to-red-900">
  <div class="flex items-center px-10 mx-auto gap-6">
    <a class="flex items-center max-h-16 text-white border-r border-white pr-6">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="currentColor"
        class="w-8 h-8 mr-2 flex-shrink-0"
      >
        <path
          fill-rule="evenodd"
          clip-rule="evenodd"
          d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75S6.615 21.75 12 21.75 21.75 17.385 21.75 12 17.385 2.25 12 2.25zm0 4.5a3 3 0 110 6 3 3 0 010-6zm0 12a7.5 7.5 0 01-6-3 6 6 0 0112 0 7.5 7.5 0 01-6 3z"
        />
      </svg>

      <h3 class="text-2xl font-semibold text-white uppercase">Dating app</h3>
    </a>

    <nav class="flex gap-3 my-2 uppercase text-lg text-white">
      <a href="#">Matches</a>
      <a href="#">Lists</a>
      <a href="#">Messages</a>
    </nav>

    <div class="flex items-center ml-auto gap-3">
      @if (accountService.currentUser(); as user) {
        <div class="dropdown dropdown-start w-40">
          <div
            tabindex="0"
            role="button"
            class="flex items-center text-white text-xl gap-3 cursor-pointer"
          >
            <img src="/user.png" alt="user avatar" class="w-8 h-8 rounded-full" />
            <span>{{ user.displayName }}</span>
          </div>

          <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded">
            <li><a>Edit profile</a></li>
            <li><a (click)="logout()">Logout</a></li>
          </ul>
        </div>
      } @else {
        <form #loginForm="ngForm" (ngSubmit)="login()" class="flex items-center gap-3">
          <input
            [(ngModel)]="creds.email"
            name="email"
            type="text"
            class="input"
            placeholder="Email"
          />

          <input
            [(ngModel)]="creds.password"
            name="password"
            type="password"
            class="input"
            placeholder="Password"
          />

          <button type="submit" class="btn">Login</button>
        </form>
      }
    </div>
  </div>
</header>
