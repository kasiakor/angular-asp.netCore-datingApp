<div class="hero bg-base-200 min-h-screen">
  @if (!registerMode()) {
    <div class="hero-content text-center">
      <div class="flex flex-col items-center">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          class="w-28 h-28 text-primary mb-4"
        >
          <path
            fill-rule="evenodd"
            clip-rule="evenodd"
            d="M16.5 6a3.75 3.75 0 1 1 0 7.5 3.75 3.75 0 0 1 0-7.5Zm-9 0a4.5 4.5 0 1 1 0 9 4.5 4.5 0 0 1 0-9Zm0 10.5c-2.52 0-4.77.82-6.158 2.084A.75.75 0 0 0 1.5 19.5h12a.75.75 0 0 0 .158-.916C12.27 17.32 10.02 16.5 7.5 16.5Zm9 0c-1.106 0-2.145.18-3.06.504.63.45 1.176.972 1.611 1.55.23.306.348.678.348 1.071v.375H21a.75.75 0 0 0 .509-1.302C20.39 17.476 18.57 16.5 16.5 16.5Z"
          />
        </svg>

        <h1 class="text-5xl font-bold">Find your match</h1>

        <p class="py-6 text-base-content/80">Come on in... all you need to do is sign up</p>

        <div class="flex items-center gap-3">
          <button (click)="showRegister(true)" class="btn btn-primary btn-lg">Register</button>
          <button class="btn btn-outline btn-primary btn-lg">Learn more</button>
        </div>
      </div>
    </div>
  } @else {
    <div class="text-2xl text-center w-full flex justify-center">
      <app-register
        class="block w-full max-w-lg"
        (cancelRegister)="showRegister($event)"
      ></app-register>
    </div>
  }
</div>
